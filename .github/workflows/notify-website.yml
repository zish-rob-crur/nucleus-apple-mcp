name: Notify Website

on:
  push:
    branches:
      - main
    paths:
      - "docs/introducing-nucleus.md"
      - "docs/images/introducing-nucleus/**"

permissions: {}

jobs:
  dispatch:
    if: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger website sync
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/zish-rob-crur/zish-rob-crur.com/dispatches" \
            -d @- <<EOF
          {
            "event_type": "nucleus-docs-updated",
            "client_payload": {
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_sha": "${GITHUB_SHA}"
            }
          }
          EOF
