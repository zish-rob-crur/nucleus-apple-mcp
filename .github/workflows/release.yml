name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          if [[ "$tag" != "$version" ]]; then
            echo "Tag version $tag does not match pyproject version $version" >&2
            exit 1
          fi

      - name: Build distribution artifacts
        run: uv build

      - name: Smoke test built wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n1)"
          uvx --from "$wheel" nucleus-apple --help
          uvx --from "$wheel" nucleus-apple-mcp --help

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
